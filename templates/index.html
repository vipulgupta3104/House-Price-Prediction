<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .form-container input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 20px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .form-container input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            border: none;
        }
        .form-container input[type="submit"]:hover {
            background-color: #45a049;
        }
        .result {
            font-size: 1.5em;
            color: #4CAF50;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Predict House Price</h2>
        <form action="/predict" method="post">
            <label for="bedr">No. of bedrooms:</label>
            <input type="number" name="bedr" required>
            
            <label for="bathr">No. of bathrooms:</label>
            <input type="number" name="bathr" required>
            
            <label for="floors">No. of Floors:</label>
            <input type="number" name="Floors" required>
            
            <label for="year">Year built in:</label>
            <input type="number" name="year" required>
            
            <label for="locat">Enter location of the house from 'Downtown', 'Suburban', 'Urban', 'Rural': </label>
            <input type="text" name="locat" required>

            <label for="cond">Enter condition of the house from 'Excellent', 'Good', 'Fair', 'Poor': </label>
            <input type="text" name="cond" required>

            <label for="gar">Enter if garage present (Yes/No): </label>
            <input type="text" name="gar" required>

            <label for="area">Enter area of the house:</label>
            <input type="number" name="area" required>
            
            <input type="submit" value="Predict">
        </form>
        {% if prediction_text %}
        <div class="result">{{ prediction_text }}</div>
        {% endif %}
    </div>
</body>
</html>
